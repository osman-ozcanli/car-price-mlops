name: Deploy App to HF Space

on:
  push:
    paths:
      - "app/app.py"
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: huggingface_hub kur
        run: pip install huggingface_hub

      - name: app.py'yi HF Space'e push et
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: python scripts/push_app_to_space.py

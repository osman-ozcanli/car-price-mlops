name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      - name: Install dev tools
        run: pip install ruff pytest

      - name: Lint
        # E501 line-too-long is noisy on data-heavy files; treat as warning only.
        run: ruff check . --extend-select=I --ignore=E501

      - name: Test
        run: pytest -q
